name: Docker

"on":
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  ROS_DISTRO: humble
  IMAGE_NAME: r2_master_interface

jobs:
  build:
    name: Build and validate Docker image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute image names
        id: image
        shell: bash
        run: |
          set -euo pipefail
          owner="$(printf '%s' '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "local=${IMAGE_NAME}:${ROS_DISTRO}" >>"${GITHUB_OUTPUT}"
          echo "remote=ghcr.io/${owner}/${IMAGE_NAME}" >>"${GITHUB_OUTPUT}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ] || [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "should_push=true" >>"${GITHUB_OUTPUT}"
          else
            echo "should_push=false" >>"${GITHUB_OUTPUT}"
          fi

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ steps.image.outputs.remote }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=${{ env.ROS_DISTRO }},enable={{is_default_branch}}
            type=semver,pattern=${{ env.ROS_DISTRO }}-{{version}}
            type=semver,pattern=${{ env.ROS_DISTRO }}-{{major}}.{{minor}}

      - name: Build Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          build-args: |
            ROS_DISTRO=${{ env.ROS_DISTRO }}
            USE_APT_MIRROR=false
          load: true
          tags: |
            ${{ steps.image.outputs.local }}
            ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate ROS interfaces
        run: |
          docker run --rm "${{ steps.image.outputs.local }}" bash -lc '
            ros2 interface show interfaces/msg/SerialFrame &&
            ros2 interface show interfaces/msg/ChassisFeedback &&
            ros2 interface show interfaces/msg/PoseCommand &&
            ros2 interface show interfaces/msg/PoseFeedback
          '

      - name: Login to GHCR
        if: github.event_name != 'pull_request' && steps.image.outputs.should_push == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        if: github.event_name != 'pull_request' && steps.image.outputs.should_push == 'true'
        run: |
          while IFS= read -r tag; do
            if [ -n "${tag}" ]; then
              docker push "${tag}"
            fi
          done <<<"${{ steps.meta.outputs.tags }}"
